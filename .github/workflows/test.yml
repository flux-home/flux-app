name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

# Cancel superseded runs on the same ref (e.g. rapid PR pushes).
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # actions/checkout@v6.0.3

      # ── Flutter (cached) ────────────────────────────────────────────────────
      # Pure-Dart unit tests run on the VM — no Android SDK/NDK or
      # CHIPController.aar needed (the commissioning tests use fakes, never the
      # platform channel).
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # ── Pub cache ───────────────────────────────────────────────────────────
      - name: Cache pub packages
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # actions/cache@v5.0.5
        with:
          path: ~/.pub-cache
          key: pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-

      - name: Flutter pub get
        run: flutter pub get

      - name: Flutter test
        run: flutter test
